global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: producer
    metrics_path: /metrics
    static_configs:
      - targets: ["producer:8000"]

  - job_name: aggregation-service
    metrics_path: /metrics
    static_configs:
      - targets: ["aggregation-service:8001"]

  - job_name: export-service
    metrics_path: /metrics
    static_configs:
      - targets: ["export-service:8002"]

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]
