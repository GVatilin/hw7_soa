name: ci

on:
  push:
  pull_request:

env:
  COMPOSE_PROJECT_NAME: hw5soa

jobs:
  build-test-observe:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install unit test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r producer/requirements.txt
          python -m pip install -r aggregator/requirements.txt
          python -m pip install -r exporter/requirements.txt

      - name: Unit tests - producer
        working-directory: producer
        run: python -m pytest -q tests/unit

      - name: Unit tests - aggregation-service
        working-directory: aggregator
        run: python -m pytest -q tests/unit

      - name: Unit tests - export-service
        working-directory: exporter
        run: python -m pytest -q tests/unit

      - name: Build Docker images
        run: docker compose build producer aggregation-service export-service tests

      - name: Start stack
        run: docker compose up -d

      - name: Wait for stack
        run: python scripts/wait_for_stack.py

      - name: Integration and E2E tests
        run: docker compose run --rm tests

      - name: Load test
        run: docker compose run --rm k6

      - name: Check Prometheus SLI thresholds
        run: python scripts/check_sli.py --prometheus http://localhost:9090 --output artifacts/sli-results.json

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color > artifacts/compose-logs.txt || true

      - name: Save CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-observability-artifacts
          path: |
            artifacts/
            prometheus/alerts.yml
            grafana/dashboards/*.json

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans
