services:
  kafka-controller:
    image: apache/kafka:3.9.2
    container_name: kafka-controller
    hostname: kafka-controller
    restart: unless-stopped
    environment:
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller:9093
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-metadata-quorum.sh --bootstrap-controller localhost:9093 describe --status >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  kafka-1:
    image: apache/kafka:3.9.2
    container_name: kafka-1
    hostname: kafka-1
    restart: unless-stopped
    depends_on:
      kafka-controller:
        condition: service_healthy
    ports:
      - "19092:9092"
    environment:
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  kafka-2:
    image: apache/kafka:3.9.2
    container_name: kafka-2
    hostname: kafka-2
    restart: unless-stopped
    depends_on:
      kafka-controller:
        condition: service_healthy
    ports:
      - "19094:9092"
    environment:
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    hostname: schema-registry
    restart: unless-stopped
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-1:9092,PLAINTEXT://kafka-2:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  kafka-topic-init:
    image: apache/kafka:3.9.2
    container_name: kafka-topic-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092,kafka-2:9092
      --create --if-not-exists
      --topic movie-events
      --partitions 3
      --replication-factor 2
      --config min.insync.replicas=1
      && echo 'Topic movie-events created.'
      "
    restart: "no"

  kafka-init:
    image: curlimages/curl:8.7.1
    container_name: kafka-init
    depends_on:
      kafka-topic-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    volumes:
      - ./schemas:/schemas:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      curl -fsS -X POST http://schema-registry:8081/subjects/movie-events-value/versions
      -H 'Content-Type: application/vnd.schemaregistry.v1+json'
      --data @/schemas/movie_event_schema_registry.json
      && echo 'Schema registered.'
      "
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse
    depends_on:
      schema-registry:
        condition: service_healthy
    ports:
      - "8123:8123"
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:17
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: movie
      POSTGRES_PASSWORD: movie
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: minio
    command: server /data --console-address ':9001'
    ports:
      - "19001:9001"
      - "19000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/movie-analytics &&
      mc anonymous set private local/movie-analytics || true
      "

  producer:
    build:
      context: ./producer
    container_name: producer
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092
      KAFKA_TOPIC: movie-events
      KAFKA_PARTITIONS: "3"
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    volumes:
      - ./schemas:/app/schemas:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 20

  aggregation-service:
    build:
      context: ./aggregator
    container_name: aggregation-service
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      POSTGRES_DSN: postgresql://movie:movie@postgres:5432/postgres
      AGGREGATION_CRON: ${AGGREGATION_CRON:-*/2 * * * *}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 20

  export-service:
    build:
      context: ./exporter
    container_name: export-service
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8002:8002"
    environment:
      POSTGRES_DSN: postgresql://movie:movie@postgres:5432/postgres
      EXPORT_CRON: ${EXPORT_CRON:-*/5 * * * *}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka-exporter
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    command:
      - --kafka.server=kafka-1:9092
      - --kafka.server=kafka-2:9092
    ports:
      - "9308:9308"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://movie:movie@postgres:5432/postgres?sslmode=disable
    ports:
      - "9187:9187"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    depends_on:
      producer:
        condition: service_healthy
      aggregation-service:
        condition: service_healthy
      export-service:
        condition: service_healthy
      kafka-exporter:
        condition: service_started
      postgres-exporter:
        condition: service_started
      alertmanager:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_started
      aggregation-service:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 30

  k6:
    image: grafana/k6:0.53.0
    container_name: k6
    profiles: ["load"]
    depends_on:
      producer:
        condition: service_healthy
    volumes:
      - ./load:/scripts:ro
      - ./artifacts:/artifacts
    command: ["run", "--summary-export", "/artifacts/k6-summary.json", "/scripts/load.js"]

  tests:
    build:
      context: ./tests
    container_name: tests
    profiles: ["tests"]
    depends_on:
      producer:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      aggregation-service:
        condition: service_healthy
      export-service:
        condition: service_healthy
      prometheus:
        condition: service_started
    command: ["pytest", "-q", "-s", "tests/integration", "tests/e2e", "tests/test_observability.py"]
