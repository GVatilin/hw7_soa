apiVersion: 1

datasources:
  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: false
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      secure: false
      username: default
      defaultDatabase: movie_analytics
      dialTimeout: 10
      queryTimeout: 60
    secureJsonData:
      password: ""

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 5s
